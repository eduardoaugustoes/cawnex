[project]
name = "cawnex-providers"
version = "0.1.0"
description = "BYOL provider abstraction for Cawnex"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.52.0",
    "pydantic>=2.0",
    "cryptography>=46.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cawnex_providers"]
