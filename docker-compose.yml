services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cawnex
      POSTGRES_PASSWORD: cawnex
      POSTGRES_DB: cawnex
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 5433 to avoid conflicts with any existing postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cawnex"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # 6380 to avoid conflicts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
