[project]
name = "cawnex-git-ops"
version = "0.1.0"
description = "Git worktree and PR management for Cawnex agents"
requires-python = ">=3.12"
dependencies = [
    "gitpython>=3.1",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cawnex_git_ops"]
