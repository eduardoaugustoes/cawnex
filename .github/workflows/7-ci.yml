name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "apps/api/**"
      - "apps/worker/**"
      - "lambdas/auth-post-confirmation/**"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-infra/**"

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  infra-check:
    name: Infra type-check + CDK synth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        run: cd infra && npm ci

      - name: Type-check
        run: cd infra && npm run type-check

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Build API dist (required by CDK synth)
        run: cd apps/api && make build-lambda

      - name: CDK synth
        run: |
          cd infra
          npx cdk synth Cawnex-dev \
            --context stage=dev \
            --context stack=main \
            --quiet

  api-lint:
    name: API lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check apps/api/

      - name: Format check
        run: ruff format --check apps/api/
