name: POC 6 — Worker Lambda + EFS

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Deploy or destroy the stack"
        type: choice
        options:
          - deploy
          - destroy
        default: deploy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: poc6
  ECR_REPO: cawnex-poc6-worker-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: inputs.action == 'deploy'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 1: Create ECR repo + push image BEFORE CDK deploy
      - name: Create ECR repository (if not exists)
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPO }} --region ${{ env.AWS_REGION }} --no-cli-pager

      - name: Get ECR URI
        id: ecr
        run: |
          ECR_URI=$(aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPO }} \
            --query 'repositories[0].repositoryUri' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "uri=$ECR_URI" >> "$GITHUB_OUTPUT"
          echo "ECR URI: $ECR_URI"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ steps.ecr.outputs.uri }}

      - name: Build and push Docker image
        run: |
          docker build -t cawnex-worker lambdas/poc6-worker/
          docker tag cawnex-worker:latest ${{ steps.ecr.outputs.uri }}:latest
          docker push ${{ steps.ecr.outputs.uri }}:latest

      # Step 2: CDK deploy (Lambda will find image in ECR)
      - name: Install CDK dependencies
        run: cd infra && npm ci

      - name: Get DynamoDB Stream ARN
        id: stream
        run: |
          STREAM_ARN=$(aws dynamodb describe-table \
            --table-name cawnex-poc5-blackboard-dev \
            --query 'Table.LatestStreamArn' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "arn=$STREAM_ARN" >> "$GITHUB_OUTPUT"
          echo "Stream ARN: $STREAM_ARN"

      - name: CDK Deploy (infra)
        run: |
          cd infra
          npx cdk deploy --context stack=${{ env.STACK_NAME }} --context stage=dev \
            --context blackboardStreamArn=${{ steps.stream.outputs.arn }} \
            --require-approval never 2>&1

      # Step 3: Inject secrets
      - name: Inject secrets
        run: |
          # Try OAuth refresh for $0 subscription token; fall back to API key
          ACCESS_TOKEN=$(curl -sf -X POST https://console.anthropic.com/v1/oauth/token \
            -H "Content-Type: application/json" \
            -d "{\"grant_type\":\"refresh_token\",\"client_id\":\"9d1c250a-e61b-44d9-88ed-5944d1962f5e\",\"refresh_token\":\"${{ secrets.ANTHROPIC_REFRESH_TOKEN }}\"}" \
            2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null || true)

          if [ -n "$ACCESS_TOKEN" ]; then
            echo "OAuth token refreshed (${#ACCESS_TOKEN} chars, \$0 cost)"
            AUTH_VAR="ANTHROPIC_AUTH_TOKEN=${ACCESS_TOKEN}"
          else
            echo "::warning::OAuth refresh failed, using API key fallback"
            AUTH_VAR="ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
          fi

          aws lambda update-function-configuration \
            --function-name cawnex-poc6-worker-dev \
            --environment "Variables={
              BLACKBOARD_TABLE=cawnex-poc5-blackboard-dev,
              ANTHROPIC_MODEL=claude-sonnet-4-20250514,
              ${AUTH_VAR},
              GITHUB_TOKEN=${{ secrets.GH_PAT }},
              EFS_MOUNT=/mnt/repos,
              STAGE=dev
            }" \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager

      - name: Summary
        run: |
          echo "## POC 6 Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker Lambda**: cawnex-poc6-worker-dev" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR Image**: ${{ steps.ecr.outputs.uri }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Blackboard**: cawnex-poc5-blackboard-dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Worker is now listening for TASK records on DynamoDB Stream." >> $GITHUB_STEP_SUMMARY

  destroy:
    runs-on: ubuntu-latest
    if: inputs.action == 'destroy'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install CDK dependencies
        run: cd infra && npm ci

      - name: CDK Destroy
        run: |
          cd infra
          npx cdk destroy --context stack=${{ env.STACK_NAME }} --context stage=dev --force
