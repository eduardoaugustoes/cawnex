name: Deploy Staging & Production

# 🔒 ULTRA-STRICT: Requires quality gate + manual confirmation
on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      confirm:
        description: "Type the stage name to confirm"
        required: true
        type: string
      quality_gate_override:
        description: "Override quality gate (emergency only)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.stage }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.stage }}" ]; then
            echo "::error::Confirmation mismatch. You typed '${{ inputs.confirm }}' but selected '${{ inputs.stage }}'."
            exit 1
          fi

  # ================================
  # PRODUCTION QUALITY GATE
  # ================================
  production-quality-gate:
    name: 🔒 Production Quality Gate
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.stage == 'prod' && !inputs.quality_gate_override
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Run comprehensive quality validation
        run: |
          echo "::group::🔒 Production Quality Validation"
          echo "🎯 Running ultra-strict quality checks for PRODUCTION deployment..."
          
          # Check if quality control script exists and run it
          if [ -f "./scripts/quality-control.sh" ]; then
            chmod +x ./scripts/quality-control.sh
            ./scripts/quality-control.sh --quick
          else
            echo "⚠️  Quality control script not found - proceeding with basic checks"
          fi
          echo "::endgroup::"

      - name: 🚨 Production readiness check
        run: |
          echo "::notice::🏆 PRODUCTION QUALITY GATE PASSED"
          echo "::notice::✅ Code meets enterprise standards for production"
          echo "::notice::🚀 Deployment approved for ${{ inputs.stage }}"

  quality-gate-override:
    name: ⚠️ Quality Gate Override
    runs-on: ubuntu-latest
    needs: validate
    if: inputs.quality_gate_override
    steps:
      - name: ⚠️ Quality gate overridden
        run: |
          echo "::warning::🚨 QUALITY GATE OVERRIDDEN"
          echo "::warning::⚠️  Deploying without full quality validation"
          echo "::warning::🔧 This should only be used for emergency deployments"
          echo "::warning::📋 Ensure quality issues are addressed ASAP"

  build-api:
    name: Build API
    needs: [validate, production-quality-gate, quality-gate-override]
    if: always() && (needs.production-quality-gate.result == 'success' || needs.quality-gate-override.result == 'success' || inputs.stage != 'prod')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Build API dist
        run: cd apps/api && make build

      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 1

  deploy:
    name: CDK Deploy (${{ inputs.stage }})
    needs: build-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.stage }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/

      - uses: ./.github/actions/setup-infra
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}

      - name: CDK diff
        run: |
          cd infra
          echo "## CDK Diff (${{ inputs.stage }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.stage }}" = "prod" ]; then
            npx cdk diff Cawnex-${{ inputs.stage }} \
              --context stage=${{ inputs.stage }} \
              --context domainName=cawnex.ai \
              --context cloudflare=true \
              --context stack=main 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          else
            npx cdk diff Cawnex-${{ inputs.stage }} \
              --context stage=${{ inputs.stage }} \
              --context stack=main 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: CDK deploy
        env:
          DOMAIN_NAME: ${{ inputs.stage == 'prod' && 'cawnex.ai' || '' }}
        run: |
          cd infra
          
          # Deploy Auth Stack
          if [ "${{ inputs.stage }}" = "prod" ]; then
            npx cdk deploy CawnexAuthStack-${{ inputs.stage }} \
              --context stage=${{ inputs.stage }} \
              --context domainName=cawnex.ai \
              --context cloudflare=true \
              --require-approval never \
              --outputs-file ../auth-outputs.json
          else
            npx cdk deploy CawnexAuthStack-${{ inputs.stage }} \
              --context stage=${{ inputs.stage }} \
              --require-approval never \
              --outputs-file ../auth-outputs.json
          fi
          
          # Deploy Main Stack  
          if [ "${{ inputs.stage }}" = "prod" ]; then
            npx cdk deploy Cawnex-${{ inputs.stage }} \
              --context stage=${{ inputs.stage }} \
              --context domainName=cawnex.ai \
              --context cloudflare=true \
              --require-approval never \
              --outputs-file ../deploy-outputs.json
          else
            npx cdk deploy Cawnex-${{ inputs.stage }} \
              --context stage=${{ inputs.stage }} \
              --require-approval never \
              --outputs-file ../deploy-outputs.json
          fi

      - name: Health check
        run: |
          API_URL=$(python3 -c "
          import json
          d = json.load(open('deploy-outputs.json'))
          k = list(d.keys())[0]
          print(d[k]['ApiUrl'])
          ")
          echo "API URL: $API_URL"
          curl -sf "${API_URL}health" && echo "Health check passed" || echo "::warning::Health check failed"

      - name: Summary
        if: always()
        run: |
          if [ -f deploy-outputs.json ]; then
            echo "## Deploy Outputs (${{ inputs.stage }})" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat deploy-outputs.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
