name: "POC 3 — Murder + Crow Integration"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Deploy or destroy the stack"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      stage:
        description: "Target stage"
        required: true
        type: choice
        options:
          - dev
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  poc3:
    name: "${{ inputs.action }} POC 3 (${{ inputs.stage }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Synth (validate)
        working-directory: infra
        run: npx cdk synth CawnexPoc3-${{ inputs.stage }} --context stage=${{ inputs.stage }} --context stack=poc3

      - name: CDK Diff (preview changes)
        if: inputs.action == 'deploy'
        working-directory: infra
        run: npx cdk diff CawnexPoc3-${{ inputs.stage }} --context stage=${{ inputs.stage }} --context stack=poc3 || true

      - name: CDK Deploy
        if: inputs.action == 'deploy'
        working-directory: infra
        run: |
          npx cdk deploy CawnexPoc3-${{ inputs.stage }} \
            --context stage=${{ inputs.stage }} \
            --context stack=poc3 \
            --require-approval never \
            --outputs-file ../poc3-outputs.json

      - name: Show Outputs
        if: inputs.action == 'deploy'
        run: |
          echo "## POC 3 Deployment Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat poc3-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Required: Set Lambda Environment Variables" >> $GITHUB_STEP_SUMMARY
          echo "Set these via AWS Console → Lambda → cawnex-poc3-murder-${{ inputs.stage }}:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ANTHROPIC_API_KEY\` — your Anthropic API key" >> $GITHUB_STEP_SUMMARY
          echo "- \`GITHUB_TOKEN\` — GitHub PAT with repo scope" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Test" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          MURDER_URL=$(cat poc3-outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); k=list(d.keys())[0]; print(d[k]['MurderEndpoint'])")
          echo "curl -s -X POST $MURDER_URL \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  -H 'Content-Type: application/json' \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  -d '{\"repo\":\"eduardoaugustoes/cawnex\",\"issue_number\":3}'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: CDK Destroy
        if: inputs.action == 'destroy'
        working-directory: infra
        run: |
          npx cdk destroy CawnexPoc3-${{ inputs.stage }} \
            --context stage=${{ inputs.stage }} \
            --context stack=poc3 \
            --force

      - name: Summary
        run: |
          if [ "${{ inputs.action }}" = "deploy" ]; then
            echo "✅ POC 3 deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "🗑️ POC 3 destroyed successfully" >> $GITHUB_STEP_SUMMARY
          fi
