name: "POC 1 — MCP Crow on Lambda"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Deploy or destroy the stack"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      stage:
        description: "Target stage"
        required: true
        type: choice
        options:
          - dev
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  poc1:
    name: "${{ inputs.action }} POC 1 (${{ inputs.stage }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Synth (validate)
        working-directory: infra
        run: npx cdk synth CawnexPoc1-${{ inputs.stage }} --context stage=${{ inputs.stage }}

      - name: CDK Diff (preview changes)
        if: inputs.action == 'deploy'
        working-directory: infra
        run: npx cdk diff CawnexPoc1-${{ inputs.stage }} --context stage=${{ inputs.stage }} || true

      - name: CDK Deploy
        if: inputs.action == 'deploy'
        working-directory: infra
        run: |
          npx cdk deploy CawnexPoc1-${{ inputs.stage }} \
            --context stage=${{ inputs.stage }} \
            --require-approval never \
            --outputs-file ../poc1-outputs.json

      - name: Show Outputs
        if: inputs.action == 'deploy'
        run: |
          echo "## POC 1 Deployment Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat poc1-outputs.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "### Quick Test"
          echo "Run this to test the MCP endpoint:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          MCP_URL=$(cat poc1-outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); k=list(d.keys())[0]; print(d[k]['McpEndpoint'])")
          echo "curl -X POST $MCP_URL \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  -H 'Content-Type: application/json' \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"clientInfo\":{\"name\":\"test\"}}}'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: CDK Destroy
        if: inputs.action == 'destroy'
        working-directory: infra
        run: |
          npx cdk destroy CawnexPoc1-${{ inputs.stage }} \
            --context stage=${{ inputs.stage }} \
            --force

      - name: Summary
        run: |
          if [ "${{ inputs.action }}" = "deploy" ]; then
            echo "✅ POC 1 deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "🗑️ POC 1 destroyed successfully" >> $GITHUB_STEP_SUMMARY
          fi
