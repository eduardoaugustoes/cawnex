name: Deploy Dev

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "apps/api/**"
      - "apps/worker/**"
      - "lambdas/auth-post-confirmation/**"
      - ".github/workflows/deploy-dev.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STAGE: dev

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Build API dist
        run: cd apps/api && make build

      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 1

  deploy:
    name: CDK Deploy
    needs: build-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/

      - uses: ./.github/actions/setup-infra
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}

      - name: CDK diff
        run: |
          cd infra
          echo "## CDK Diff (dev)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx cdk diff Cawnex-${{ env.STAGE }} \
            --context stage=${{ env.STAGE }} \
            --context stack=main 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: CDK deploy
        run: |
          cd infra
          npx cdk deploy CawnexAuthStack-${{ env.STAGE }} \
            --context stage=${{ env.STAGE }} \
            --require-approval never \
            --outputs-file ../auth-outputs.json
          
          npx cdk deploy Cawnex-${{ env.STAGE }} \
            --context stage=${{ env.STAGE }} \
            --require-approval never \
            --outputs-file ../deploy-outputs.json

      - name: Health check
        run: |
          API_URL=$(python3 -c "
          import json
          d = json.load(open('deploy-outputs.json'))
          k = list(d.keys())[0]
          print(d[k]['ApiUrl'])
          ")
          echo "API URL: $API_URL"
          curl -sf "${API_URL}health" && echo "Health check passed" || echo "::warning::Health check failed"

      - name: Summary
        if: always()
        run: |
          if [ -f deploy-outputs.json ]; then
            echo "## Deploy Outputs" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat deploy-outputs.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
