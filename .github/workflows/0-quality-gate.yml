name: 🔒 Ultra-Strict Quality Gate

# BLOCKS ALL DEPLOYMENTS UNTIL QUALITY STANDARDS ARE MET
# This workflow enforces enterprise-grade code quality standards

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: quality-gate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ================================
  # PYTHON ULTRA-STRICT VALIDATION
  # ================================
  python-quality:
    name: 🐍 Python Ultra-Strict Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: contains(github.event.head_commit.modified, 'apps/api/') || contains(github.event.head_commit.added, 'apps/api/') || github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: 📦 Install dependencies with strict tools
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: 🔍 MyPy Type Checking (ULTRA-STRICT)
        run: |
          cd apps/api
          echo "::group::MyPy Type Checking"
          mypy src --strict --show-error-codes --pretty
          echo "::endgroup::"

      - name: 📝 Black Code Formatting Check
        run: |
          cd apps/api
          echo "::group::Black Formatting Check"
          black src tests --check --line-length=88
          echo "::endgroup::"

      - name: 🔄 isort Import Sorting Check
        run: |
          cd apps/api
          echo "::group::isort Import Check"
          isort src tests --check-only --profile black
          echo "::endgroup::"

      - name: 🔍 Flake8 Linting (Zero Warnings)
        run: |
          cd apps/api
          echo "::group::Flake8 Linting"
          flake8 src --max-line-length=88 --max-complexity=10 --count --statistics
          echo "::endgroup::"

      - name: 🔒 Bandit Security Scan
        run: |
          cd apps/api
          echo "::group::Bandit Security Scan"
          bandit -r src -f json -o bandit-report.json
          echo "::endgroup::"

      - name: 🧪 Tests with Coverage (80% Required)
        run: |
          cd apps/api
          echo "::group::Tests with Coverage"
          pytest --cov=src --cov-report=term-missing --cov-report=html --cov-fail-under=80
          echo "::endgroup::"

      - name: 📊 Upload coverage to artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-report
          path: apps/api/htmlcov/

      - name: 📊 Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-security-report
          path: apps/api/bandit-report.json

  # ================================
  # TYPESCRIPT ULTRA-STRICT VALIDATION
  # ================================
  typescript-quality:
    name: ⚡ TypeScript Ultra-Strict Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: contains(github.event.head_commit.modified, 'infra/') || github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript Type Checking (ULTRA-STRICT)
        run: |
          echo "::group::TypeScript Type Checking"
          npm run type-check:all
          echo "::endgroup::"

      - name: 🔍 ESLint (Zero Warnings Policy)
        run: |
          echo "::group::ESLint Zero Warnings"
          npm run quality:typescript
          echo "::endgroup::"

      - name: 📝 Prettier Formatting Check
        run: |
          echo "::group::Prettier Formatting"
          npm run format:check
          echo "::endgroup::"

      - name: 🔧 CDK Synth Validation
        run: |
          cd infra
          echo "::group::CDK Synth Test"
          npx cdk synth --quiet --context stage=dev
          echo "::endgroup::"

      - name: 🔍 npm audit (Security)
        run: |
          echo "::group::npm Security Audit"
          npm audit --audit-level=moderate
          echo "::endgroup::"

  # ================================
  # IOS SWIFT STRICT VALIDATION
  # ================================
  ios-quality:
    name: 📱 iOS Swift Ultra-Strict Quality
    runs-on: macos-latest
    timeout-minutes: 20
    if: contains(github.event.head_commit.modified, 'apps/ios/') || github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 💾 Cache Xcode derived data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('apps/ios/Cawnex/**/*.swift') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: 🔍 Swift Build with ULTRA-STRICT Settings
        run: |
          cd apps/ios
          echo "::group::Swift Ultra-Strict Build"
          xcodebuild clean build \
            -project Cawnex/Cawnex.xcodeproj \
            -scheme Cawnex \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            RUN_CLANG_STATIC_ANALYZER=YES \
            CLANG_STATIC_ANALYZER_MODE=deep
          echo "::endgroup::"

      - name: 🧪 Run Unit Tests
        run: |
          cd apps/ios
          echo "::group::iOS Unit Tests"
          xcodebuild test \
            -project Cawnex/Cawnex.xcodeproj \
            -scheme Cawnex \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult
          echo "::endgroup::"

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: apps/ios/TestResults.xcresult

  # ================================
  # COMPREHENSIVE QUALITY REPORT
  # ================================
  quality-summary:
    name: 📊 Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [python-quality, typescript-quality, ios-quality]
    if: always()
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📊 Generate Quality Report
        run: |
          echo "# 🔒 Ultra-Strict Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📋 Quality Checks Status" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|---------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.python-quality.result }}" == "success" ]; then
            echo "| 🐍 Python API | ✅ PASSED | MyPy, Black, Flake8, Bandit, Tests |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🐍 Python API | ❌ FAILED | Check logs for details |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.typescript-quality.result }}" == "success" ]; then
            echo "| ⚡ TypeScript Infra | ✅ PASSED | TSC, ESLint, Prettier, CDK |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚡ TypeScript Infra | ❌ FAILED | Check logs for details |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.ios-quality.result }}" == "success" ]; then
            echo "| 📱 iOS Swift | ✅ PASSED | Strict Build, Static Analysis, Tests |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📱 iOS Swift | ❌ FAILED | Check logs for details |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Quality Standards Enforced" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Zero warnings policy** - All warnings treated as errors" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Strict typing** - No \`any\` types allowed" >> $GITHUB_STEP_SUMMARY  
          echo "- ✅ **80% test coverage** - Required for all components" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Security scanning** - Vulnerability detection" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Code complexity** - Max 10 cyclomatic complexity" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Consistent formatting** - Automated style enforcement" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Quality Gate Status
        run: |
          if [ "${{ needs.python-quality.result }}" != "success" ] || \
             [ "${{ needs.typescript-quality.result }}" != "success" ] || \
             [ "${{ needs.ios-quality.result }}" != "success" ]; then
            echo "::error::🚨 QUALITY GATE FAILED - Fix issues before merging"
            echo "::error::❌ One or more quality checks failed"
            echo "::error::🔧 Run ./scripts/quality-control.sh locally to debug"
            exit 1
          else
            echo "::notice::🏆 ALL QUALITY CHECKS PASSED!"
            echo "::notice::✨ Code meets ultra-strict enterprise standards"
          fi

  # ================================
  # DEPLOYMENT BLOCKER
  # ================================
  deployment-gate:
    name: 🔒 Deployment Quality Gate
    runs-on: ubuntu-latest
    needs: [python-quality, typescript-quality, ios-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 🔒 Quality Gate Check for Deployment
        run: |
          if [ "${{ needs.python-quality.result }}" != "success" ] || \
             [ "${{ needs.typescript-quality.result }}" != "success" ] || \
             [ "${{ needs.ios-quality.result }}" != "success" ]; then
            echo "::error::🚨 DEPLOYMENT BLOCKED - Quality checks failed"
            echo "::error::❌ Cannot deploy with failing quality checks"
            echo "::error::🔧 Fix all issues and push again"
            exit 1
          else
            echo "::notice::🚀 DEPLOYMENT APPROVED - Quality gate passed"
          fi

      - name: 📊 Deployment Summary
        run: |
          echo "# 🚀 Deployment Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ APPROVED FOR DEPLOYMENT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All ultra-strict quality checks have passed:" >> $GITHUB_STEP_SUMMARY
          echo "- 🐍 Python API: Enterprise-grade type safety" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ TypeScript: Zero-warning infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 iOS: Professional Swift standards" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Code is ready for production deployment.** 🎯" >> $GITHUB_STEP_SUMMARY